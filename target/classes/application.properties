# ===================================================================
# application.properties PRODUCCION (Docker / Linux)
# ===================================================================
# Las variables de entorno del contenedor sobreescriben estos valores
# automaticamente gracias al entrypoint.sh.
# Pueden cambiarlos sin rebuild con: docker run -e TRAFFIC_DIR=/otra/ruta
# ===================================================================
spring.application.name=demo
# --- RUTAS DEL SISTEMA DE ARCHIVOS (DENTRO DEL CONTENEDOR) ---
# Directorio raiz de capturas PCAP y reportes CSV
traffic.dir=/var/openvpn/daily
# Script de captura de trafico en vivo
script.path=/usr/local/bin/capture_vpn.sh
# Script Python de procesamiento y ML
reg.script.path=/usr/local/bin/Pruebas.py
# Ruta base del proyecto KillSwitch (modelos y scripts de entrenamiento)
python.path=/usr/local/bin/KillSwitch
# Base de datos de usuarios (JSON)
users.file=/etc/openvpn/interface/backend/client.json